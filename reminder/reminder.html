<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健康提醒</title>
  <link rel="stylesheet" href="reminder.css">
</head>
<body>
  <div class="reminder-card">
    <div class="emoji" id="emoji">💧</div>
    <h1 id="title">该喝水啦！</h1>
    <p id="message">休息一下，喝杯水吧～</p>
    <div class="actions">
      <button class="btn btn-primary" id="done">知道了</button>
      <button class="btn btn-secondary" id="snooze">稍后 10 分钟</button>
    </div>
  </div>
  <script src="reminder.js"></script>
</body>
</html>
